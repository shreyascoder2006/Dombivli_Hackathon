version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stratify_postgres
    environment:
      POSTGRES_DB: stratify_db
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stratify_network

  # Redis for caching and real-time data
  redis:
    image: redis:7-alpine
    container_name: stratify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stratify_network

  # FastAPI Backend
  backend:
    build: .
    container_name: stratify_backend
    environment:
      DATABASE_URL: postgresql://trading_user:trading_pass@postgres:5432/stratify_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - ./logs:/app/logs
    networks:
      - stratify_network
    restart: unless-stopped

  # Celery Worker for background tasks
  celery_worker:
    build: .
    container_name: stratify_celery
    command: celery -A celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://trading_user:trading_pass@postgres:5432/stratify_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - ./logs:/app/logs
    networks:
      - stratify_network
    restart: unless-stopped

  # Celery Beat for scheduled tasks
  celery_beat:
    build: .
    container_name: stratify_beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://trading_user:trading_pass@postgres:5432/stratify_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - ./logs:/app/logs
    networks:
      - stratify_network
    restart: unless-stopped

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: stratify_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - stratify_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  stratify_network:
    driver: bridge